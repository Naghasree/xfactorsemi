<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | XFactor Semiconductor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; }
    .brand-x { color: #1a1a1a; font-weight: 900; font-style: italic; font-size: 1.6rem; }
    .brand-factor { color: #CC0000; font-weight: 900; font-style: italic; font-size: 1.6rem; }
    .btn-danger { background-color: #CC0000 !important; border-color: #CC0000 !important; }
    .form-control:focus { border-color: #CC0000; box-shadow: 0 0 0 0.2rem rgba(204,0,0,0.15); }
  </style>
</head>
<body>
  <div class="login-box shadow">
    <div class="text-center mb-4">
      <div><span class="brand-x">X</span><span class="brand-factor">Factor</span></div>
      <div style="font-size:0.8rem; color:#CC0000; font-weight:600; letter-spacing:0.05em;">Semiconductor</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter site password" required autofocus>
      </div>
      <button type="submit" class="btn btn-danger w-100">Enter Site</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
